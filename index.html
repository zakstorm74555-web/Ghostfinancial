<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Finance | AI Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: #0b0f1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        input, select { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('uid')) { window.location.href = "ft.html"; }
    </script>

    <div class="container max-w-md mx-auto p-4 relative z-10">
        
        <div id="authCard" class="glass-card rounded-3xl p-8 animate__animated animate__fadeIn">
            <div class="text-center mb-8">
                <h1 id="authTitle" class="text-3xl font-bold text-white tracking-tight">Ghost Finance</h1>
                <p id="authSub" class="text-gray-400 text-sm mt-2">AI-Powered Wealth Intelligence</p>
            </div>

            <form id="authForm" class="space-y-4">
                <input type="email" id="email" class="w-full rounded-xl px-4 py-3 outline-none transition-all" placeholder="Email Address" required>
                <input type="password" id="password" class="w-full rounded-xl px-4 py-3 outline-none transition-all" placeholder="Password" required>
                <button type="submit" id="mainBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition-all">Login</button>
            </form>

            <div class="mt-6 text-center">
                <button id="toggleAuth" class="text-blue-400 text-sm hover:text-blue-300 transition">Don't have an account? Create One</button>
            </div>
        </div>

        <div id="profileCard" class="glass-card rounded-3xl p-8 hidden animate__animated animate__fadeInRight">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-white">Setup Profile</h2>
                <p class="text-gray-400 text-sm">Let the AI know who you are</p>
            </div>
            <form id="profileForm" class="space-y-4">
                <input type="text" id="name" class="w-full rounded-xl px-4 py-3 outline-none" placeholder="Your Name" required>
                <input type="number" id="age" class="w-full rounded-xl px-4 py-3 outline-none" placeholder="Your Age" required>
                <select id="gender" class="w-full rounded-xl px-4 py-3 outline-none">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all">Start Tracking</button>
            </form>
        </div>
    </div>

    <script type="module">
        // --- IMPORTANT: Hugging Face Direct URL ---
        const API_URL = "https://paradoxstudio9807-financial-tracker.hf.space"; 
        
        let isLogin = true;
        const authCard = document.getElementById('authCard');
        const profileCard = document.getElementById('profileCard');
        const toggleBtn = document.getElementById('toggleAuth');

        // Toggle Switch
        toggleBtn.onclick = () => {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? "Welcome Back" : "New Account";
            document.getElementById('mainBtn').innerText = isLogin ? "Login" : "Sign Up";
            toggleBtn.innerText = isLogin ? "Don't have an account? Sign Up" : "Back to Login";
        };

        // Auth Logic
        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const endpoint = isLogin ? '/login' : '/signup';
            
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const result = await response.json();
                
                if (result.uid || result.token) {
                    const uid = result.uid || result.token; // Handling different return formats
                    localStorage.setItem('uid', uid);
                    
                    if (isLogin) {
                        window.location.href = "ft.html";
                    } else {
                        authCard.classList.add('hidden');
                        profileCard.classList.remove('hidden');
                    }
                } else {
                    alert("Ghost, error aa gaya: " + (result.error || "Server issue"));
                }
            } catch (err) {
                alert("Server start ho raha hai, thora intezar karo! (Check Logs on HF)");
            }
        };

        // Profile Setup Logic
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const uid = localStorage.getItem('uid');
            
            const profileData = {
                uid: uid,
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value
            };

            // Saving Profile to Firebase via app.py
            await fetch(`${API_URL}/update-profile`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profileData)
            });

            window.location.href = "ft.html";
        };
    </script>
</body>
</html>
