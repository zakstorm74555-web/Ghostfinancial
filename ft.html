<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Finance | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-grad { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    </style>
</head>
<body class="p-4 md:p-8">

    <script>
        if (!localStorage.getItem('uid')) { window.location.href = "index.html"; }
    </script>

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 animate__animated animate__fadeInDown">
            <div>
                <h1 class="text-2xl font-bold">Ghost Finance</h1>
                <p class="text-gray-400 text-sm">Welcome back, Developer</p>
            </div>
            <button onclick="logout()" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 px-4 py-2 rounded-lg text-sm transition">Logout</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="glass p-6 rounded-2xl animate__animated animate__fadeInLeft">
                <p class="text-gray-400 text-xs uppercase font-bold">Total Savings</p>
                <h2 id="savingsVal" class="text-3xl font-bold text-green-400">Rs. 0</h2>
            </div>
            <div class="glass p-6 rounded-2xl animate__animated animate__fadeInUp">
                <p class="text-gray-400 text-xs uppercase font-bold">Total Loss</p>
                <h2 id="lossVal" class="text-3xl font-bold text-red-400">Rs. 0</h2>
            </div>
            <div class="card-grad p-6 rounded-2xl shadow-lg animate__animated animate__fadeInRight">
                <p class="text-blue-100 text-xs uppercase font-bold">Remaining</p>
                <h2 id="remainVal" class="text-3xl font-bold text-white">Rs. 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass p-6 rounded-3xl animate__animated animate__fadeInLeft">
                <h3 class="text-xl font-bold mb-4">Add Transaction</h3>
                <form id="transForm" class="space-y-4">
                    <input type="text" id="desc" placeholder="Description (e.g. Yoghurt)" class="w-full bg-gray-800 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 ring-blue-500" required>
                    <input type="number" id="amount" placeholder="Amount" class="w-full bg-gray-800 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 ring-blue-500" required>
                    <select id="type" class="w-full bg-gray-800 border-none rounded-xl px-4 py-3 outline-none">
                        <option value="income">Income / Earned</option>
                        <option value="expense">Expense / Spent</option>
                    </select>
                    <button type="submit" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Save Transaction</button>
                </form>
            </div>

            <div class="glass p-6 rounded-3xl border-t-4 border-blue-500 animate__animated animate__fadeInRight">
                <div class="flex items-center gap-2 mb-4">
                    <span class="p-2 bg-blue-500 rounded-lg">🤖</span>
                    <h3 class="text-xl font-bold">AI Financial Agent</h3>
                </div>
                <div id="aiBox" class="text-gray-300 italic min-h-[100px] flex items-center justify-center text-center">
                    "Data load ho raha hai, Ghost..."
                </div>
                <button onclick="getAIAdvice()" class="mt-4 w-full border border-blue-500 text-blue-500 py-2 rounded-xl hover:bg-blue-500 hover:text-white transition">Ask AI for Advice</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://paradoxstudio9807-financial-tracker.hf.space";
        const uid = localStorage.getItem('uid');

        // 1. Transaction Save Logic
        document.getElementById('transForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                uid: uid,
                description: document.getElementById('desc').value,
                amount: document.getElementById('amount').value,
                type: document.getElementById('type').value
            };

            // Yahan hum app.py ko data bhej rahe hain
            const res = await fetch(`${API_URL}/add-transaction`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert("Hisaab save ho gaya!");
                location.reload(); // Data refresh karne ke liye
            }
        };

        // 2. Fetch Stats & AI Advice
        async function loadDashboard() {
            const res = await fetch(`${API_URL}/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid: uid })
            });
            const result = await res.json();

            document.getElementById('savingsVal').innerText = `Rs. ${result.savings}`;
            document.getElementById('lossVal').innerText = `Rs. ${result.loss}`;
            document.getElementById('remainVal').innerText = `Rs. ${result.remaining}`;
            document.getElementById('aiBox').innerText = result.advice;
        }

        async function getAIAdvice() {
            document.getElementById('aiBox').innerText = "AI soch raha hai...";
            await loadDashboard();
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        // Initial Load
        loadDashboard();
    </script>
</body>
</html>
